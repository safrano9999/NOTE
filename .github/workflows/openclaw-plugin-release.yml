name: OpenClaw plugin

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "20*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  ZIP_NAME: note-latest.zip

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python requirements
        run: python3 -m pip install -r requirements.txt

      - name: Check plugin sources
        run: bash scripts/check.sh

      - name: Build plugin archive
        run: bash ./openclaw_plugin_zip.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: note-latest
          path: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$ZIP_NAME" "$ZIP_NAME.sha256" --clobber
          else
            gh release create "$tag" "$ZIP_NAME" "$ZIP_NAME.sha256" \
              --title "$tag" \
              --notes "OpenClaw plugin archive for NOTE."
          fi

      - name: Publish latest alias
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_tag="latest"
          notes="Latest OpenClaw plugin archive for NOTE. Current source tag: ${GITHUB_REF_NAME}."
          if gh release view "$latest_tag" >/dev/null 2>&1; then
            gh release upload "$latest_tag" "$ZIP_NAME" "$ZIP_NAME.sha256" --clobber
            gh release edit "$latest_tag" --title "$latest_tag" --notes "$notes"
          else
            for attempt in 1 2 3; do
              if gh release create "$latest_tag" "$ZIP_NAME" "$ZIP_NAME.sha256" \
                --target "$GITHUB_SHA" \
                --title "$latest_tag" \
                --notes "$notes"; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep $((attempt * 5))
            done
          fi
